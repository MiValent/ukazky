<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Webová Stránka</title>
    <!-- Načtení Tailwind CSS pro moderní a čistý design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Plynulé přechody pro interaktivní prvky */
        .transition-all {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col justify-between">

    <!-- Hlavní obsah webu -->
    <main class="w-full flex-grow">
        
        <!-- Sekce s obrázkem přes celou šířku (Hero Banner) -->
        <div class="relative w-full h-[60vh] md:h-[70vh] overflow-hidden shadow-lg bg-gray-900">
            <!-- Samotný obrázek s plynulým načítáním a ošetřením chyb -->
            <img 
                src="Fotka 21.04.2026 v 9.23.jpg" 
                alt="Fotka z učebny s obrazovkou" 
                class="w-full h-full object-cover object-center opacity-90"
                onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1600&q=80'; console.log('Lokální obrázek nebyl nalezen, použit záložní obrázek.');"
            />
            <!-- Jemný tmavý přechod přes obrázek pro lepší kontrast -->
            <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-black/20"></div>
            
            <!-- Volitelný textový překryv uprostřed obrázku -->
            <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-4">
                <h1 class="text-white text-3xl md:text-5xl font-bold tracking-wide drop-shadow-md mb-2">
                    Vítejte na mé stránce
                </h1>
                <p class="text-gray-200 text-sm md:text-lg max-w-xl drop-shadow">
                    Moderní prezentace s vaším vlastním pozadím a rychlou navigací.
                </p>
            </div>
        </div>

        <!-- Sekce se třemi tlačítky -->
        <section class="max-w-4xl mx-auto px-6 py-12 md:py-16 text-center">
            <h2 class="text-2xl font-semibold text-gray-850 mb-4">Rychlé odkazy</h2>
            <p class="text-gray-600 mb-8 max-w-md mx-auto">Vyberte si jednu z níže uvedených možností pro zobrazení dalších podrobností.</p>
            
            <!-- Kontejner pro 3 tlačítka, na mobilu pod sebou, na větších displejích vedle sebe -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-3xl mx-auto">
                
                <!-- Tlačítko 1 -->
                <button 
                    onclick="zobrazZpravu('O mně')" 
                    class="group relative flex flex-col items-center justify-center p-6 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:border-blue-500 hover:-translate-y-1 transition-all duration-300 cursor-pointer"
                >
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4 group-hover:bg-blue-500 group-hover:text-white transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <span class="text-lg font-bold text-gray-800 group-hover:text-blue-600 transition-colors">O mně</span>
                    <span class="text-xs text-gray-400 mt-1">Kdo jsem a co dělám</span>
                </button>

                <!-- Tlačítko 2 -->
                <button 
                    onclick="zobrazZpravu('Služby')" 
                    class="group relative flex flex-col items-center justify-center p-6 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:border-indigo-500 hover:-translate-y-1 transition-all duration-300 cursor-pointer"
                >
                    <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-4 group-hover:bg-indigo-500 group-hover:text-white transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <span class="text-lg font-bold text-gray-800 group-hover:text-indigo-600 transition-colors">Služby</span>
                    <span class="text-xs text-gray-400 mt-1">Nabídka mých služeb</span>
                </button>

                <!-- Tlačítko 3 -->
                <button 
                    onclick="zobrazZpravu('Kontakt')" 
                    class="group relative flex flex-col items-center justify-center p-6 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-xl hover:border-emerald-500 hover:-translate-y-1 transition-all duration-300 cursor-pointer"
                >
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center mb-4 group-hover:bg-emerald-500 group-hover:text-white transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <span class="text-lg font-bold text-gray-800 group-hover:text-emerald-600 transition-colors">Kontakt</span>
                    <span class="text-xs text-gray-400 mt-1">Napište mi zprávu</span>
                </button>

            </div>

            <!-- Interaktivní box pro zobrazení kliknutí (náhrada za ošklivý alert) -->
            <div id="info-box" class="hidden max-w-md mx-auto mt-8 p-4 bg-gray-100 rounded-xl text-gray-700 font-medium transition-all opacity-0 transform translate-y-2">
                Zvolili jste sekci: <span id="zvolena-sekce" class="font-bold text-gray-950"></span>
            </div>
        </section>
    </main>

    <!-- Patička webu -->
    <footer class="w-full bg-white border-t border-gray-100 py-6 text-center text-sm text-gray-400">
        <p>&copy; 2026 Moje Webová Stránka. Všechna práva vyhrazena.</p>
    </footer>

    <!-- Jednoduchý skript pro obsluhu kliknutí na tlačítka -->
    <script>
        function zobrazZpravu(sekce) {
            const infoBox = document.getElementById('info-box');
            const zvolenaSekce = document.getElementById('zvolena-sekce');
            
            // Nastavení textu podle stisknutého tlačítka
            zvolenaSekce.innerText = sekce;
            
            // Zobrazení a animace informačního boxu
            infoBox.classList.remove('hidden');
            setTimeout(() => {
                infoBox.classList.remove('opacity-0', 'translate-y-2');
                infoBox.classList.add('opacity-100', 'translate-y-0');
            }, 50);
        }
    </script>
</body>
</html>
